<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Deletar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Deletar aluno</p>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="atualizar.html" class="link-navegacao">Atualizar</a>
                <a href="deletar.html" class="link-navegacao ativo">Deletar</a>
            </nav>
        </header>

        <main class="conteudo">
            <section class="cartao">
                <div class="titulo-cartao">
                    <h2>Excluir aluno</h2>
                    <p>Digite o ID do aluno que deseja remover do sistema.</p>
                </div>

                <form class="grade-formulario">
                    <label class="campo campo-longo">
                        <span>ID do aluno</span>
                        <input type="number" placeholder="Ex.: 3" required>
                    </label>

                    <button type="submit">Excluir aluno</button>
                </form>

                <div class="resultado">
                    <h3>Atenção</h3>
                    <p class="texto-ajuda">Essa ação remove o aluno do cadastro. Confirme antes de continuar.</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
